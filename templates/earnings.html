<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earnings Calendar — Besting the Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:        #0a0a0f;
      --ink-light:  #1a1a20;
      --paper:      #f5f3ee;
      --cream:      #edeae3;
      --gold:       #c9a84c;
      --gold-hover: #9f7f48;
      --forest:     #1a5c2e;
      --forest-bg:  #f0f7f0;
      --forest-border: #c8e6c8;
      --muted:      #7a7870;
      --border:     rgba(10, 10, 15, 0.12);
      --shadow:     0 2px 8px rgba(0,0,0,0.07);
      --shadow-lg:  0 12px 48px rgba(0,0,0,0.11);
      --radius:     6px;
      --radius-lg:  10px;
      --red:        #dc2626;
      --blue:       #2563eb;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Syne', sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .site-header {
      background: var(--ink);
      padding: 20px 0;
      border-bottom: 2px solid var(--gold);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .logo { display: flex; align-items: baseline; gap: 12px; text-decoration: none; }
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.9rem;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-text em { font-style: normal; color: var(--gold); }
    .header-back {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: color 0.2s;
    }
    .header-back:hover { color: var(--gold); }

    /* ── Hero ── */
    .hero {
      background: var(--ink);
      padding: 56px 32px 64px;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .hero-inner { max-width: 1200px; margin: 0 auto; }
    .hero-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 4vw, 3rem);
      color: #fff;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    .hero h1 em { font-style: normal; color: var(--gold); }
    .hero-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.03em;
      line-height: 1.7;
    }

    /* ── Main ── */
    .main { flex: 1; padding: 48px 32px 80px; }
    .main-inner { max-width: 1200px; margin: 0 auto; }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .controls-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .week-filter {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .week-filter.active, .week-filter:hover {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--ink);
    }
    .result-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Date Groups ── */
    .date-group { margin-bottom: 32px; }
    .date-group-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
    }
    .date-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .date-line { flex: 1; height: 1px; background: var(--border); }
    .days-away-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .days-soon { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .days-mid  { background: rgba(26,92,46,0.1);   color: var(--forest); border: 1px solid rgba(26,92,46,0.2); }
    .days-far  { background: rgba(10,10,15,0.06);  color: var(--muted);  border: 1px solid var(--border); }

    /* ── Earnings Cards ── */
    .earnings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .earnings-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px 22px;
      border-left: 4px solid var(--gold);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .earnings-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .earnings-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    .card-ticker {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--ink);
      line-height: 1;
    }
    .card-company {
      font-family: 'DM Mono', monospace;
      font-size: 0.64rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 3px;
    }
    .card-date-pill {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--forest-bg);
      color: var(--forest);
      border: 1px solid var(--forest-border);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .earnings-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .stat {
      background: var(--paper);
      padding: 10px 12px;
    }
    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.54rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .stat-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--ink);
      line-height: 1;
    }
    .stat-value.positive { color: var(--forest); }
    .stat-value.negative { color: var(--red); }
    .stat-value.na { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.8rem; }

    /* ── Loading / Empty ── */
    .loading-state {
      text-align: center;
      padding: 80px 32px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .site-footer {
      background: var(--ink);
      padding: 32px;
      border-top: 1px solid var(--gold);
    }
    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .footer-logo { font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #fff; }
    .footer-logo em { font-style: normal; color: var(--gold); }
    .footer-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.04em;
      text-align: right;
      line-height: 1.8;
    }
    .footer-meta a { color: var(--gold); text-decoration: none; }

    @media (max-width: 768px) {
      .earnings-grid { grid-template-columns: 1fr; }
      .header-inner { padding: 0 20px; }
      .main { padding: 32px 20px 64px; }
      .hero { padding: 40px 20px 48px; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
      .footer-meta { text-align: left; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-text">Besting the <em>Market</em></span>
      </a>
      <a href="/" class="header-back">← Back to Hub</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">Tools · Earnings Calendar</div>
      <h1>Upcoming <em>Earnings</em></h1>
      <p class="hero-sub">Earnings dates for stocks in our tracked universe — updated live from market data.</p>
    </div>
  </section>

  <main class="main">
    <div class="main-inner">

      <div class="controls">
        <div class="controls-left">
          <button class="week-filter active" onclick="setWeeks(4, this)">4 Weeks</button>
          <button class="week-filter" onclick="setWeeks(6, this)">6 Weeks</button>
          <button class="week-filter" onclick="setWeeks(8, this)">8 Weeks</button>
        </div>
        <span class="result-count" id="result-count"></span>
      </div>

      <div id="calendar-container">
        <div class="loading-state">
          <div class="loading-spinner"></div>
          Fetching earnings data...
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-logo">Besting the <em>Market</em></div>
      <div class="footer-meta">
        <div>Data sourced from public market data. Not financial advice.</div>
        <div><a href="/">← Strategy Hub</a></div>
      </div>
    </div>
  </footer>

  <script>
    let currentWeeks = 4;

    async function loadEarnings(weeks) {
      const container = document.getElementById('calendar-container');
      container.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div>Fetching earnings data...</div>';
      document.getElementById('result-count').textContent = '';

      try {
        const res = await fetch(`/api/earnings?weeks=${weeks}`);
        const data = await res.json();
        renderCalendar(data);
      } catch (e) {
        container.innerHTML = '<div class="loading-state">Failed to load earnings data. Please try again.</div>';
      }
    }

    function setWeeks(w, btn) {
      currentWeeks = w;
      document.querySelectorAll('.week-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadEarnings(w);
    }

    function daysBadge(days) {
      const cls = days <= 14 ? 'days-soon' : days <= 30 ? 'days-mid' : 'days-far';
      const label = days === 0 ? 'Today' : days === 1 ? 'Tomorrow' : `${days}d away`;
      return `<span class="days-away-badge ${cls}">${label}</span>`;
    }

    function epsClass(val) {
      if (val === null || val === undefined) return 'na';
      return val >= 0 ? 'positive' : 'negative';
    }

    function epsDisplay(val) {
      if (val === null || val === undefined) return 'N/A';
      const sign = val >= 0 ? '+' : '';
      return `${sign}$${Math.abs(val).toFixed(2)}`;
    }

    function renderCalendar(data) {
      const container = document.getElementById('calendar-container');
      if (!data.length) {
        container.innerHTML = '<div class="loading-state">No upcoming earnings found in this window.</div>';
        document.getElementById('result-count').textContent = '0 companies';
        return;
      }

      document.getElementById('result-count').textContent = `${data.length} upcoming`;

      // Group by date
      const groups = {};
      data.forEach(e => {
        if (!groups[e.earnings_date]) groups[e.earnings_date] = [];
        groups[e.earnings_date].push(e);
      });

      let html = '';
      Object.entries(groups).forEach(([dateKey, items]) => {
        const first = items[0];
        html += `
          <div class="date-group">
            <div class="date-group-header">
              <span class="date-label">${first.weekday}, ${first.earnings_date_fmt}</span>
              <div class="date-line"></div>
              ${daysBadge(first.days_away)}
            </div>
            <div class="earnings-grid">
              ${items.map(e => `
                <div class="earnings-card">
                  <div class="earnings-card-top">
                    <div>
                      <div class="card-ticker">${e.ticker}</div>
                      <div class="card-company">${e.name}</div>
                    </div>
                    <span class="card-date-pill">${e.weekday.slice(0,3)} ${e.earnings_date_fmt.split(',')[0]}</span>
                  </div>
                  <div class="earnings-stats">
                    <div class="stat">
                      <div class="stat-label">EPS Est.</div>
                      <div class="stat-value ${epsClass(e.eps_estimate)}">${epsDisplay(e.eps_estimate)}</div>
                    </div>
                    <div class="stat">
                      <div class="stat-label">EPS High</div>
                      <div class="stat-value ${epsClass(e.eps_high)}">${epsDisplay(e.eps_high)}</div>
                    </div>
                    <div class="stat">
                      <div class="stat-label">Rev Est.</div>
                      <div class="stat-value ${e.revenue_fmt === 'N/A' ? 'na' : ''}">${e.revenue_fmt}</div>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>`;
      });

      container.innerHTML = html;
    }

    loadEarnings(currentWeeks);
  </script>

</body>
</html>
